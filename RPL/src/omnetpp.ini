[General]
network = rpl.RPLNetwork
sim-time-limit = 100s
repeat = 1


**.cmdenv-log-level = info
cmdenv-express-mode = true


**.numNodes = 7
**.RPLUpwardRouting.mopType = 0
**.AppLayer.sendInterval = 10s
**.AppLayer.dataPacketSize = 100B
**.IdealPhy.transmissionRange = 100m
**.IdealMac.transmissionDelay = 0.001s


record-eventlog = false
**.vector-recording = true
**.scalar-recording = true


**.node[*].rpl.**.result-recording-modes = all
**.node[*].net.**.result-recording-modes = all

[Config MOP0]
description = "RPL with MOP0 (Upward only)"
**.RPLUpwardRouting.mopType = 0

[Config MOP1]
description = "RPL with MOP1 (Non-Storing)"
**.RPLUpwardRouting.mopType = 1

[Config MOP2]
description = "RPL with MOP2 (Storing)"
**.RPLUpwardRouting.mopType = 2
